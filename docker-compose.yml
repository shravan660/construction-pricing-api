version: "3.9"

services:
  api:
    build: .
    container_name: pricing_engine_api
    ports:
      - "8000:8000"
    volumes:
      # Persist the DB and indexes between container restarts
      - pricing_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/pricing.db
      - FAISS_INDEX_PATH=/app/data/indexes/products.index
      - PRODUCT_META_PATH=/app/data/indexes/products_meta.json
      - RAW_DATA_PATH=/app/data/raw
      - PROCESSED_DATA_PATH=/app/data/processed
      - DEBUG=false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  pricing_data:
    driver: local
